spring:
  main:
    allow-circular-references: true
  application:
    name: wealthguard_backend
  datasource:
        url: jdbc:mysql://localhost:3306/wealthguard
        username: root
        password: admin

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
springdoc:
  swagger-ui:
    path: /api-docs.html
    operationsSorter: method
